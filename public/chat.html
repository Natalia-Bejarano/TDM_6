<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UCA - Sistema de Chat</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="stylesheet" href="css/chat.css" />
  </head>
  <body>
    <!-- Contenedor principal de la página de perfil -->
    <div class="profile-layout">

      <!-- Barra lateral izquierda del perfil -->
      <aside class="profile-sidebar">

        <!-- Logo institucional -->
        <div class="profile-logo-box">
          <img src="./resources/logouca3.png" alt="Logo UCA" class="profile-logo" />
          <h2>UCA</h2>
        </div>

        <!-- Navegación interna del perfil -->
        <nav class="profile-nav">
          <a href="chat.html">Mis chats</a>
          <a href="profile.html" class="active">Configuración</a>
        </nav>

        <!-- Información resumida del usuario en la parte inferior -->
        <div class="profile-user-bottom">
          <img id="sidebar-avatar" src="resources/pexels-teguhsugi-18679285.jpg" alt="Usuario" />
          <strong id="sidebar-name">Usuario</strong>
        </div>
        <footer class="sidebar-footer">
          <button id="logout-btn" class="logout-link">Cerrar Sesión</button>
        </footer>
      </aside>

      <!-- Contenido principal de configuración -->
      <main class="profile-main">
        
    <div class="app-layout">
      <aside class="directory-container">
        <header class="directory-header">
          <div class="user-profile-header" id="current-user-info"></div>
          <input
            type="text"
            id="search-contact"
            placeholder="Buscar contacto..."
          />
        </header>

        <div id="contact-list" class="contact-list"></div>

        
      </aside>

      <main class="chat-main">
        <div id="welcome-screen" class="empty-state">
          <div class="clock-icon">💬</div>
          <h2 id="welcome-title">Bandeja de consultas entrantes</h2>
          <p id="welcome-msg">
            Seleccione un estudiante o docente disponible para iniciar la
            conversación.
          </p>
        </div>
        <div id="chat-session" class="chat-session" style="display: none">
          <header class="chat-header">
            <div id="active-contact-info" class="active-contact-info"></div>
            <button id="close-chat" class="back-btn">← Volver</button>
          </header>

          <div id="messages-display" class="messages-display"></div>

          <footer class="chat-input-area">
            <input
              type="text"
              id="user-input"
              placeholder="Escribe un mensaje..."
              autocomplete="off"
            />
            <button id="send-message-btn">➤</button>
          </footer>
        </div>
      </main>
    </div>
    
    <script type="module" src="js/chat.js"></script>
    
  </body>
</html>
