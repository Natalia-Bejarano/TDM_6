<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UCA - Acceso Institucional</title>

    <link rel="stylesheet" href="./css/global.css" />
    <link rel="stylesheet" href="./css/login.css" />
  </head>
  <body>
    <div class="login-container">
      <div class="login-header">
        <img src="img/logo-uca.png" alt="Logo UCA" class="logo-institucional" />
        <h1>Universidad Católica Américana</h1>
        <p>Sistema de Atención al Estudiante</p>
      </div>

      <form id="loginForm" class="login-form">
        <label for="email">Correo Institucional</label>
        <input
          type="email"
          id="email"
          placeholder="ejemplo@uca.edu.co"
          required
        />

        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required />

        <button type="submit" class="btn-primary">Iniciar Sesión</button>
      </form>

<!-- Añadimos el login divider para la autenticacion con google -->

      <div class="login-divider">
  <span>Continuar con</span>
</div>

<button type="button" class="btn-google">
  <span class="google-icon">G</span>
  Google
</button>

<a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>


<!-- Final-->

      <p id="loginError" class="error-message"></p>
    </div>

    <script type="module" src="js/login.js"></script>
  </body>
</html>
